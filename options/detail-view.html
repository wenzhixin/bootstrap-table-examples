<script>
init({
  title: 'Detail View',
  desc: 'Use `detailView: true` to show detail view table.',
  links: ['bootstrap-table.min.css'],
  scripts: ['bootstrap-table.min.js']
})
</script>

<template>
  <table
    id="table"
    data-toggle="table"
    data-height="460"
    data-detail-view="true"
    data-detail-formatter="detailFormatter"
    data-show-refresh="true"
    data-url="json/data1.json"
  >
    <thead>
      <tr>
        <th data-field="id">
          ID
        </th>
        <th data-field="name">
          Item Name
        </th>
        <th data-field="price">
          Item Price
        </th>
      </tr>
    </thead>
  </table>
</template>

<script>
  window.detailFormatter = (index, row) => {
    const html = []
    const columns = $('#table').bootstrapTable('getOptions').columns
    const getTitle = key => {
      if (!Array.isArray(columns) || columns.length === 0) {
        return key
      }

      const flatColumns = columns.flatMap(row => Array.isArray(row) ? row : [])
      const column = flatColumns.find(col => col && col.field === key)

      return column && column.title ? column.title : key
    }

    for (const [key, value] of Object.entries(row)) {
      html.push(`<p><b>${getTitle(key)}:</b> ${value}</p>`)
    }
    return html.join('')
  }
</script>
