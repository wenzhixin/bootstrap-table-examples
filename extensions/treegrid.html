<script>
init({
  title: 'Treegrid',
  desc: 'Use Plugin: <a href="https://github.com/maxazan/jquery-treegrid" target="_blank">jquery-treegrid</a> and bootstrap-table-treegrid.',
  links: [
    'https://cdn.jsdelivr.net/npm/jquery-treegrid@0.3.0/css/jquery.treegrid.css',
    'bootstrap-table.min.css'
  ],
  scripts: [
    'https://cdn.jsdelivr.net/npm/jquery-treegrid@0.3.0/js/jquery.treegrid.min.js',
    'bootstrap-table.min.js',
    'extensions/treegrid/bootstrap-table-treegrid.min.js'
  ]
})
</script>

<template>
  <table id="table"></table>
</template>

<script>
  const $table = $('#table')

  function mounted () {
    $table.bootstrapTable({
      url: 'json/treegrid.json',
      // idField: The field that uniquely identifies each row
      idField: 'id',
      showColumns: true,
      columns: [
        {
          field: 'ck',
          checkbox: true
        },
        {
          field: 'name',
          // The field value used for the tree display; must match the 'treeShowField' option below
          title: 'Name'
        },
        {
          field: 'status',
          title: 'Status',
          sortable: true,
          align: 'center',
          formatter: 'statusFormatter'
        },
        {
          field: 'permissionValue',
          title: 'Permission Value'
        }
      ],
      // treeShowField: Specify the field whose text is shown for tree nodes (required by the treegrid extension)
      treeShowField: 'name',
      // parentIdField: The field that contains the parent node id
      parentIdField: 'pid',
      onPostBody () {
        const columns = $table.bootstrapTable('getOptions').columns

        if (columns && columns[0][1].visible) {
          $table.treegrid({
            // treeColumn: The zero-based index of the column to show the tree
            treeColumn: 1,
            onChange () {
              $table.bootstrapTable('resetView')
            }
          })
        }
      }
    })
  }

  window.statusFormatter = value => {
    if (value === 1) {
      return '<span class="label label-success">Active</span>'
    }
    return '<span class="label label-default">Inactive</span>'
  }
</script>
